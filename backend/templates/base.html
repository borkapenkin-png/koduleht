<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8" />
    <style>body{opacity:0}body.ready{opacity:1;transition:opacity .12s ease}</style>
    <noscript><style>body{opacity:1!important}</style></noscript>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    
    <!-- SEO URL Normalization: redirect non-www to www, trailing slash, and /index.html to clean URLs -->
    <script>
      (function() {
        var host = window.location.hostname;
        var path = window.location.pathname;
        var search = window.location.search;
        var needsRedirect = false;
        var newUrl = 'https://www.jbtasoitusmaalaus.fi';
        
        // Redirect non-www to www
        if (host === 'jbtasoitusmaalaus.fi') {
          needsRedirect = true;
        }
        
        // Remove trailing slash (except for root)
        if (path !== '/' && path.endsWith('/')) {
          path = path.slice(0, -1);
          needsRedirect = true;
        }
        
        // Remove /index.html
        if (path.endsWith('/index.html')) {
          path = path.replace('/index.html', '') || '/';
          needsRedirect = true;
        }
        
        if (needsRedirect) {
          window.location.replace(newUrl + path + search);
        }
      })();
    </script>
    
    <!-- SEO Meta Tags -->
    <title>{{ title }}</title>
    <meta name="description" content="{{ description }}" />
    {% if keywords %}<meta name="keywords" content="{{ keywords }}" />{% endif %}
    <link rel="canonical" href="{{ canonical_url }}" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{ og_title or title }}" />
    <meta property="og:description" content="{{ og_description or description }}" />
    <meta property="og:type" content="{{ og_type or 'website' }}" />
    <meta property="og:url" content="{{ canonical_url }}" />
    {% if og_image %}<meta property="og:image" content="{{ og_image }}" />{% endif %}
    <meta property="og:site_name" content="{{ company_name }}" />
    <meta property="og:locale" content="fi_FI" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og_title or title }}" />
    <meta name="twitter:description" content="{{ og_description or description }}" />
    {% if og_image %}<meta name="twitter:image" content="{{ og_image }}" />{% endif %}
    
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZP42XN14NG"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-ZP42XN14NG');
    </script>
    
    <!-- JSON-LD Structured Data -->
    {% if json_ld %}
    <script type="application/ld+json">{{ json_ld | safe }}</script>
    {% endif %}
    
    <!-- React App CSS - loaded from build -->
    {% for css_file in css_files %}
    <link rel="stylesheet" href="{{ css_file }}?v=20260319" />
    {% endfor %}
    
    <!-- FOUC prevention: hide body until CSS loads -->
    <style>body{opacity:0}body.css-ready{opacity:1;transition:opacity .15s ease}</style>
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>
<body>
    <div id="root">
        {% block seo_content %}
        {% endblock %}
        <noscript>
            <p>Tarvitset JavaScriptin taman sivun interaktiivisten ominaisuuksien kayttamiseen.</p>
        </noscript>
    </div>
    
    <!-- React App JS - loaded from build -->
    {% for js_file in js_files %}
    <script src="{{ js_file }}?v=20260319"></script>
    {% endfor %}
</body>
</html>
