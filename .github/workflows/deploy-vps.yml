name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy main branch to VPS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve deploy settings
        id: resolve
        env:
          VPS_HOST_SECRET: ${{ secrets.VPS_HOST }}
          VPS_HOST_VAR: ${{ vars.VPS_HOST }}
          VPS_USER_SECRET: ${{ secrets.VPS_USER }}
          VPS_USER_VAR: ${{ vars.VPS_USER }}
          VPS_PORT_SECRET: ${{ secrets.VPS_SSH_PORT }}
          VPS_PORT_VAR: ${{ vars.VPS_SSH_PORT }}
          VPS_PATH_SECRET: ${{ secrets.VPS_PROJECT_PATH }}
          VPS_PATH_VAR: ${{ vars.VPS_PROJECT_PATH }}
          VPS_KEY_SECRET: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail

          VPS_HOST="${VPS_HOST_SECRET:-${VPS_HOST_VAR:-}}"
          VPS_USER="${VPS_USER_SECRET:-${VPS_USER_VAR:-}}"
          VPS_PORT="${VPS_PORT_SECRET:-${VPS_PORT_VAR:-22}}"
          VPS_PATH="${VPS_PATH_SECRET:-${VPS_PATH_VAR:-}}"
          VPS_KEY="${VPS_KEY_SECRET:-}"

          missing=()
          [ -n "$VPS_HOST" ] || missing+=("VPS_HOST")
          [ -n "$VPS_USER" ] || missing+=("VPS_USER")
          [ -n "$VPS_PATH" ] || missing+=("VPS_PROJECT_PATH")
          [ -n "$VPS_KEY" ] || missing+=("VPS_SSH_KEY")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Missing required deploy settings: ${missing[*]}" >&2
            exit 1
          fi

          echo "host=$VPS_HOST" >> "$GITHUB_OUTPUT"
          echo "user=$VPS_USER" >> "$GITHUB_OUTPUT"
          echo "port=$VPS_PORT" >> "$GITHUB_OUTPUT"
          echo "path=$VPS_PATH" >> "$GITHUB_OUTPUT"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.resolve.outputs.host }}
          username: ${{ steps.resolve.outputs.user }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ steps.resolve.outputs.port }}
          script: |
            set -euo pipefail
            cd '${{ steps.resolve.outputs.path }}'

            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "Stashing VPS local changes before deploy..."
              git stash push -u -m "pre-deploy-$(date +%Y%m%d-%H%M%S)"
            fi

            echo "Pulling latest main from origin..."
            git fetch origin
            git checkout main
            git pull --ff-only origin main

            bash deploy/vps_rollout.sh
