services:
  mongodb:
    image: mongo:7
    container_name: jb-mongodb
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: jb-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:18001:8001"
    env_file:
      - backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api/settings', timeout=5)"]
      interval: 15s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: jb-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:13000:3000"
    environment:
      PORT: 3000
      BACKEND_URL: http://backend:8001
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/__server-info').then(r => { if (!r.ok) process.exit(1); }).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  mongodb_data:
